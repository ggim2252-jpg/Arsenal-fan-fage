<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPL 11시즌 순위 변화 그래프</title>`r`n    <link rel="icon" href="logo.svg" type="image/svg+xml">
    <!-- Chart.js 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1015;
            --panel-bg: #1c1e26;
            --text-light: #e0e2eb;
            --primary: #6b4cff;
            --border-color: #2b2d38;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 좌측 사이드바 (필터) */
        .sidebar {
            width: 320px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .header h1 {
            font-size: 24px;
            margin: 0 0 5px 0;
            background: linear-gradient(90deg, #fff, #8a94b5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 13px;
            color: #8a94b5;
            margin: 0 0 20px 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background-color: #2b2d38;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: #3b3e4d;
        }

        .btn.active {
            background-color: var(--primary);
        }

        .team-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .team-list::-webkit-scrollbar {
            width: 5px;
        }

        .team-list::-webkit-scrollbar-thumb {
            background: #4b4d58;
            border-radius: 4px;
        }

        .team-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(43, 45, 56, 0.4);
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .team-toggle:hover {
            background: rgba(43, 45, 56, 0.8);
        }

        .team-toggle.selected {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .team-color-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 12px;
            display: inline-block;
        }

        .team-name {
            font-size: 14px;
            font-weight: 500;
            flex: 1;
        }

        /* 스위치 토글 디자인 */
        .toggle-switch {
            width: 32px;
            height: 18px;
            background-color: #3b3e4d;
            border-radius: 10px;
            position: relative;
            transition: 0.3s;
        }

        .team-toggle.selected .toggle-switch {
            background-color: var(--primary);
        }

        .toggle-knob {
            width: 14px;
            height: 14px;
            background-color: #fff;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .team-toggle.selected .toggle-knob {
            left: 16px;
        }


        /* 우측 메인 차트 영역 */
        .main-content {
            flex: 1;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1a1c23 0%, #0f1015 100%);
        }

        .chart-wrapper {
            width: 100%;
            height: 100%;
            max-width: 1400px;
            max-height: 800px;
            background: rgba(28, 30, 38, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            position: relative;
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="header">
            <h1>PL 성적표 (2015~2026)</h1>
            <p>팀을 선택하여 순위 변화를 확인하세요.</p>
        </div>

        <div class="btn-group">
            <button class="btn" id="btnBig6">BIG 6</button>
            <button class="btn" id="btnAll">전체 선택</button>
            <button class="btn" id="btnClear">초기화</button>
        </div>

        <div class="team-list" id="teamList">
            <!-- 자바스크립트로 팀 리스트 렌더링 -->
        </div>
    </aside>

    <main class="main-content">
        <div class="chart-wrapper">
            <canvas id="plChart"></canvas>
        </div>
    </main>

    <script>
        const seasons = ['15/16', '16/17', '17/18', '18/19', '19/20', '20/21', '21/22', '22/23', '23/24', '24/25', '25/26'];

        // 사용자가 제공한 전체 시즌 데이터를 구조화 (24/25, 25/26 추가)
        const teamData = {
            "맨시티": [4, 3, 1, 1, 2, 1, 1, 1, 1, 3, 2],
            "아스날": [2, 5, 6, 5, 8, 8, 5, 2, 2, 2, 1],
            "리버풀": [8, 4, 4, 2, 1, 3, 2, 5, 3, 1, 5],
            "토트넘": [3, 2, 3, 4, 6, 7, 4, 8, 5, 17, 17],
            "맨유": [5, 6, 2, 6, 3, 2, 6, 3, 8, 15, 3],
            "첼시": [10, 1, 5, 3, 4, 4, 3, 12, 6, 4, 6],
            "뉴캐슬": [18, null, 10, 13, 13, 12, 11, 4, 7, 5, 12],
            "아스톤 빌라": [20, null, null, null, 17, 11, 14, 7, 4, 6, 4],
            "레스터": [1, 12, 9, 9, 5, 5, 8, 18, null, 18, null],
            "웨스트햄": [7, 11, 13, 10, 16, 6, 7, 14, 9, 14, 18],
            "에버턴": [11, 7, 8, 8, 12, 10, 16, 17, 15, 13, 8],
            "크리스탈 팰리스": [15, 14, 11, 12, 14, 14, 12, 11, 10, 12, 14],
            "사우스햄튼": [6, 8, 17, 16, 11, 15, 15, 20, null, 20, null],
            "브라이튼": [null, null, 15, 17, 15, 16, 9, 6, 11, 8, 10],
            "울버햄튼": [null, null, null, 7, 7, 13, 10, 13, 14, 16, 20],
            "본머스": [16, 9, 12, 14, 18, null, null, 15, 12, 9, 13],
            "번리": [null, 16, 7, 15, 10, 17, 18, null, 19, null, 19],
            "스토크": [9, 13, 19, null, null, null, null, null, null, null, null],
            "스완지": [12, 15, 18, null, null, null, null, null, null, null, null],
            "왓포드": [13, 17, 14, 11, 19, null, 19, null, null, null, null],
            "웨스트 브롬": [14, 10, 20, null, null, 19, null, null, null, null, null],
            "풀럼": [null, null, null, 19, null, 18, null, 10, 13, 11, 9],
            "셰필드 유나이티드": [null, null, null, null, 9, 20, null, null, 20, null, null],
            "리즈": [null, null, null, null, null, 9, 17, 19, null, null, 15],
            "브렌트포드": [null, null, null, null, null, null, 13, 9, 16, 10, 7],
            "노팅엄": [null, null, null, null, null, null, null, 16, 17, 7, 16],
            "선덜랜드": [17, 20, null, null, null, null, null, null, null, null, 11],
            "노리치": [19, null, null, null, 20, null, 20, null, null, null, null],
            "헐 시티": [null, 18, null, null, null, null, null, null, null, null, null],
            "미들즈브러": [null, 19, null, null, null, null, null, null, null, null, null],
            "허더즈필드": [null, null, 16, 20, null, null, null, null, null, null, null],
            "카디프": [null, null, null, 18, null, null, null, null, null, null, null],
            "루턴 타운": [null, null, null, null, null, null, null, null, 18, null, null],
            "입스위치 타운": [null, null, null, null, null, null, null, null, null, 19, null]
        };

        // 팀별 고유 색상 및 테마 지정 (EPL 구단 상징색 참고)
        const teamColors = {
            "맨시티": "#6CABDD",
            "아스날": "#EF0107",
            "리버풀": "#C8102E",
            "토트넘": "#F1F1F1", // 다크모드에서 잘보이도록
            "맨유": "#DA291C",
            "첼시": "#034694",
            "뉴캐슬": "#4b4d58", // 흰검 대비 고려
            "아스톤 빌라": "#95BFE5",
            "레스터": "#003090",
            "웨스트햄": "#7A263A",
            "에버턴": "#003399",
            "브라이튼": "#0057B8",
            "울버햄튼": "#FDB913",
            "크리스탈 팰리스": "#1B458F"
        };

        // 랜덤 HSL 컬러 생성기
        function getRandomColor(teamName) {
            if (teamColors[teamName]) return teamColors[teamName];

            // 이름 해시로 색상 생성하여 일관성 유지
            let hash = 0;
            for (let i = 0; i < teamName.length; i++) {
                hash = teamName.charCodeAt(i) + ((hash << 5) - hash);
            }
            const h = hash % 360;
            return `hsl(${h}, 70%, 65%)`; // 다크모드에 어울리는 밝기 65%
        }

        // 초기 설정 (BIG 6 기본 활성화)
        const big6 = ["맨시티", "아스날", "리버풀", "토트넘", "맨유", "첼시"];
        let selectedTeams = new Set(big6);

        let chartInstance = null;

        // 사이드바 렌더링 요소
        const teamListEl = document.getElementById('teamList');

        function initSidebar() {
            teamListEl.innerHTML = '';
            Object.keys(teamData).forEach(team => {
                const color = getRandomColor(team);
                const isSelected = selectedTeams.has(team);

                const item = document.createElement('div');
                item.className = `team-toggle ${isSelected ? 'selected' : ''}`;
                item.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <span class="team-color-indicator" style="background-color: ${color};"></span>
                        <span class="team-name">${team}</span>
                    </div>
                    <div class="toggle-switch"><div class="toggle-knob"></div></div>
                `;

                item.addEventListener('click', () => {
                    if (selectedTeams.has(team)) {
                        selectedTeams.delete(team);
                        item.classList.remove('selected');
                    } else {
                        selectedTeams.add(team);
                        item.classList.add('selected');
                    }
                    updateChart();
                });

                teamListEl.appendChild(item);
            });
        }

        // 차트 렌더링 로직
        function updateChart() {
            const datasets = [];

            Object.keys(teamData).forEach(team => {
                if (selectedTeams.has(team)) {
                    datasets.push({
                        label: team,
                        data: teamData[team].map(rank => rank === null ? NaN : rank),
                        borderColor: getRandomColor(team),
                        backgroundColor: getRandomColor(team),
                        borderWidth: 3,
                        pointRadius: 5,
                        pointHoverRadius: 8,
                        tension: 0.3, // 부드러운 곡선 적용
                        spanGaps: true // null(강등) 구간 끊어서 자연스럽게
                    });
                }
            });

            if (chartInstance) {
                chartInstance.destroy();
            }

            const ctx = document.getElementById('plChart').getContext('2d');

            // Chart.js 전역 설정 (다크 테마)
            Chart.defaults.color = '#8a94b5';
            Chart.defaults.font.family = "'Pretendard', sans-serif";

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: seasons,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: false // 커스텀 사이드바 사용하므로 범례 숨김
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 16, 21, 0.9)',
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            padding: 12,
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1,
                            itemSort: function (a, b) {
                                return a.parsed.y - b.parsed.y;
                            },
                            callbacks: {
                                label: function (context) {
                                    return context.dataset.label + ': ' + context.parsed.y + '위';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            reverse: true, // 1위가 위로 가도록 설정!
                            min: 1,
                            max: 20,
                            ticks: {
                                stepSize: 1,
                                padding: 10,
                                font: { size: 12 }
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)',
                                drawBorder: false
                            },
                            title: {
                                display: true,
                                text: '리그 순위 (1~20)',
                                color: '#8a94b5',
                                font: { size: 12 }
                            }
                        },
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)',
                                drawBorder: false
                            },
                            ticks: {
                                padding: 10,
                                font: { size: 13, weight: '500' }
                            }
                        }
                    }
                }
            });
        }

        // 버튼 이벤트 리스너
        document.getElementById('btnBig6').addEventListener('click', () => {
            selectedTeams = new Set(big6);
            initSidebar();
            updateChart();
        });

        document.getElementById('btnAll').addEventListener('click', () => {
            selectedTeams = new Set(Object.keys(teamData));
            initSidebar();
            updateChart();
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            selectedTeams.clear();
            initSidebar();
            updateChart();
        });

        // 초기 실행
        initSidebar();
        updateChart();

    </script>
</body>

</html>
